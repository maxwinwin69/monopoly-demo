<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>星際大富翁</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <div id="header">
    <div class="hstat">
      <span class="hlab">星幣</span>
      <span id="balance-val">$1,000</span>
    </div>
    <div id="logo">
      <span class="logo-mark">👾</span>
      <span class="logo-title">星際大富翁</span>
      <span class="logo-sub">GALAXY TYCOON</span>
    </div>
    <div class="hstat right">
      <span class="hlab">租金池</span>
      <span id="pot-val" class="alien">$0</span>
    </div>
  </div>

  <div id="board-wrap">
    <div class="cabinet-screw tl" aria-hidden="true"></div>
    <div class="cabinet-screw tr" aria-hidden="true"></div>
    <div class="cabinet-screw bl" aria-hidden="true"></div>
    <div class="cabinet-screw br" aria-hidden="true"></div>
    <canvas id="board"></canvas>
  </div>

  <div id="controls">
    <div id="status-bar">準備好了嗎？擲骰收租！</div>

    <div id="bet-row">
      <button id="bet-dn" class="bet-btn">−</button>
      <div id="bet-box">
        <span class="hlab">投資星幣</span>
        <span id="bet-val">$50</span>
      </div>
      <button id="bet-up" class="bet-btn">+</button>
    </div>

    <div id="action-row">
      <button id="roll-btn">🚀&nbsp;發射</button>
      <button id="cash-btn" class="hidden">💰&nbsp;結算租金</button>
    </div>

    <div id="dice-wrap" class="invisible">
      <span id="d1" class="die">⚀</span>
      <span class="op">+</span>
      <span id="d2" class="die">⚀</span>
      <span class="op">=</span>
      <span id="dtot"></span>
    </div>
  </div>

  <div id="dice-stage" class="hidden" aria-hidden="true">
    <div class="dice-stage-glow"></div>
    <div id="stage-die1" class="dice-cube">
      <div class="cube-core">
        <span class="face f1"><i></i></span>
        <span class="face f2"><i></i><i></i></span>
        <span class="face f3"><i></i><i></i><i></i></span>
        <span class="face f4"><i></i><i></i><i></i><i></i></span>
        <span class="face f5"><i></i><i></i><i></i><i></i><i></i></span>
        <span class="face f6"><i></i><i></i><i></i><i></i><i></i><i></i></span>
      </div>
    </div>
    <div id="stage-die2" class="dice-cube alt">
      <div class="cube-core">
        <span class="face f1"><i></i></span>
        <span class="face f2"><i></i><i></i></span>
        <span class="face f3"><i></i><i></i><i></i></span>
        <span class="face f4"><i></i><i></i><i></i><i></i></span>
        <span class="face f5"><i></i><i></i><i></i><i></i><i></i></span>
        <span class="face f6"><i></i><i></i><i></i><i></i><i></i><i></i></span>
      </div>
    </div>
  </div>

  <div id="card-stage" class="hidden" aria-hidden="true">
    <div class="card-stage-glow"></div>
    <div id="card-choice-row">
      <button class="fortune-card" type="button" data-card="0">
        <span class="card-face card-back"><span class="card-orbit"></span><span class="card-mark">?</span></span>
        <span class="card-face card-front"><span class="card-art">🎴</span><strong class="card-title">命運卡</strong><em class="card-result">抽卡中...</em><small class="card-desc">等待揭曉</small></span>
      </button>
      <button class="fortune-card" type="button" data-card="1">
        <span class="card-face card-back"><span class="card-orbit"></span><span class="card-mark">?</span></span>
        <span class="card-face card-front"><span class="card-art">🎴</span><strong class="card-title">命運卡</strong><em class="card-result">抽卡中...</em><small class="card-desc">等待揭曉</small></span>
      </button>
      <button class="fortune-card" type="button" data-card="2">
        <span class="card-face card-back"><span class="card-orbit"></span><span class="card-mark">?</span></span>
        <span class="card-face card-front"><span class="card-art">🎴</span><strong class="card-title">命運卡</strong><em class="card-result">抽卡中...</em><small class="card-desc">等待揭曉</small></span>
      </button>
    </div>
  </div>

  <div id="overlay" class="hidden">
    <div id="over-box">
      <div id="over-icon">👾</div>
      <div id="over-title">能量耗盡</div>
      <div id="over-sub"></div>
      <button id="over-restart">重新出發</button>
    </div>
  </div>

</div>
<script src="audio.js"></script>
<script src="game.js"></script>
</body>
</html>
