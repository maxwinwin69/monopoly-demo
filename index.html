<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>星際賭場</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <div id="header">
    <div class="hstat">
      <span class="hlab">星幣</span>
      <span id="balance-val">$1,000</span>
    </div>
    <div id="logo">👾 星際賭場</div>
    <div id="header-right">
      <div class="hstat right">
        <span class="hlab">宇宙能量</span>
        <span id="pot-val" class="alien">$0</span>
      </div>
      <div id="audio-btns">
        <button id="bgm-btn" class="aud-btn" title="背景音樂">🎵</button>
        <button id="sfx-btn" class="aud-btn" title="音效">🔊</button>
      </div>
    </div>
  </div>

  <div id="board-wrap">
    <canvas id="board"></canvas>
  </div>

  <div id="controls">
    <div id="status-bar">準備好了嗎？按下發射！</div>

    <div id="bet-row">
      <button id="bet-dn" class="bet-btn">−</button>
      <div id="bet-box">
        <span class="hlab">下注星幣</span>
        <span id="bet-val">$50</span>
      </div>
      <button id="bet-up" class="bet-btn">+</button>
    </div>

    <div id="action-row">
      <button id="roll-btn">🚀&nbsp;發射</button>
      <button id="cash-btn" class="hidden">🛸&nbsp;傳送入帳</button>
    </div>

    <div id="dice-wrap" class="invisible">
      <span id="d1" class="die">⚀</span>
      <span class="op">+</span>
      <span id="d2" class="die">⚀</span>
      <span class="op">=</span>
      <span id="dtot"></span>
    </div>
  </div>

  <div id="overlay" class="hidden">
    <div id="over-box">
      <div id="over-icon">👾</div>
      <div id="over-title">能量耗盡</div>
      <div id="over-sub"></div>
      <button id="over-restart">重新出發</button>
    </div>
  </div>

</div>
<script src="audio.js"></script>
<script src="game.js"></script>
</body>
</html>
